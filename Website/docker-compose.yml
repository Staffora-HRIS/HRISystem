# =============================================================================
# Staffora Marketing Website - Separate Docker Compose
# =============================================================================
#
# Usage:
#   docker compose -f Website/docker-compose.yml up -d
#   docker compose -f Website/docker-compose.yml down
#
# =============================================================================

services:
  website:
    build:
      context: ..
      dockerfile: Website/Dockerfile
    container_name: staffora-website
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5174
    ports:
      - "${WEBSITE_PORT:-5174}:5174"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5174/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
