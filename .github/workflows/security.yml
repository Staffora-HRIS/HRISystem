name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.38'

      - run: bun install --frozen-lockfile

      - name: Run dependency audit
        run: |
          echo "## Dependency Audit Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Use npx audit since bun doesn't have a built-in audit command
          npx audit-ci --config /dev/null --high 2>&1 | head -100 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Dependency audit complete. Review results above." >> $GITHUB_STEP_SUMMARY

  docker-scan:
    name: Docker Image Scan (${{ matrix.name }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: packages/api/Dockerfile
          - name: web
            dockerfile: packages/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.name }} image
        run: docker build -t staffora-${{ matrix.name }}:scan -f ${{ matrix.dockerfile }} .

      - name: Scan ${{ matrix.name }} image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'staffora-${{ matrix.name }}:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Scan ${{ matrix.name }} image (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'staffora-${{ matrix.name }}:scan'
          format: 'sarif'
          output: 'trivy-${{ matrix.name }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload ${{ matrix.name }} scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-${{ matrix.name }}.sarif'
          category: 'docker-${{ matrix.name }}'

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
