name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hris
          POSTGRES_PASSWORD: hris_dev_password
          POSTGRES_DB: hris
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hris"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a staffora_redis_ci --no-auth-warning ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configure Redis password
        run: |
          redis-cli CONFIG SET requirepass staffora_redis_ci
          redis-cli -a staffora_redis_ci --no-auth-warning ping

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.38'

      - run: bun install --frozen-lockfile

      - name: Type checking
        run: bun run typecheck

      - name: Linting
        run: bun run lint

      - name: Build all packages
        run: bun run build

      - name: Run migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: hris
          DB_USER: hris
          DB_PASSWORD: hris_dev_password
        run: bun run migrate:up

      - name: Run API tests with coverage
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_NAME: hris
          TEST_DB_USER: hris_app
          TEST_DB_PASSWORD: hris_dev_password
          TEST_DB_ADMIN_USER: hris
          TEST_DB_ADMIN_PASSWORD: hris_dev_password
          TEST_REDIS_HOST: localhost
          TEST_REDIS_PORT: 6379
          TEST_REDIS_PASSWORD: staffora_redis_ci
          REDIS_URL: redis://:staffora_redis_ci@localhost:6379
        run: bun test packages/api/src/test --coverage --coverage-reporter=lcov --coverage-dir=packages/api/coverage

      - name: Run shared package tests
        run: bun test packages/shared

      - name: API Coverage Summary
        if: always()
        run: |
          echo "## API Test Coverage" >> $GITHUB_STEP_SUMMARY
          if [ -f packages/api/coverage/lcov.info ]; then
            echo "Coverage report generated. See uploaded artifacts for details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            # Extract summary from lcov.info
            LINES_FOUND=$(grep -c "^DA:" packages/api/coverage/lcov.info 2>/dev/null || echo "0")
            LINES_HIT=$(grep "^DA:" packages/api/coverage/lcov.info 2>/dev/null | grep -v ",0$" | wc -l || echo "0")
            FN_FOUND=$(grep -c "^FN:" packages/api/coverage/lcov.info 2>/dev/null || echo "0")
            FN_HIT=$(grep -c "^FNDA:[1-9]" packages/api/coverage/lcov.info 2>/dev/null || echo "0")
            echo "| Metric | Hit | Total |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-----|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Lines | $LINES_HIT | $LINES_FOUND |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions | $FN_HIT | $FN_FOUND |" >> $GITHUB_STEP_SUMMARY
          else
            echo "No coverage report found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload API coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: packages/api/coverage/
          retention-days: 14

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.38'

      - run: bun install --frozen-lockfile

      - name: Run web tests with coverage
        run: bun run test:web -- --run --coverage

      - name: Frontend Coverage Summary
        if: always()
        run: |
          echo "## Frontend Test Coverage" >> $GITHUB_STEP_SUMMARY
          if [ -f packages/web/coverage/lcov.info ]; then
            echo "Coverage report generated. See uploaded artifacts for details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            LINES_FOUND=$(grep -c "^DA:" packages/web/coverage/lcov.info 2>/dev/null || echo "0")
            LINES_HIT=$(grep "^DA:" packages/web/coverage/lcov.info 2>/dev/null | grep -v ",0$" | wc -l || echo "0")
            FN_FOUND=$(grep -c "^FN:" packages/web/coverage/lcov.info 2>/dev/null || echo "0")
            FN_HIT=$(grep -c "^FNDA:[1-9]" packages/web/coverage/lcov.info 2>/dev/null || echo "0")
            echo "| Metric | Hit | Total |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-----|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Lines | $LINES_HIT | $LINES_FOUND |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions | $FN_HIT | $FN_FOUND |" >> $GITHUB_STEP_SUMMARY
          else
            echo "No coverage report found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: packages/web/coverage/
          retention-days: 14
