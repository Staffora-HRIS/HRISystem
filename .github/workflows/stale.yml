# =============================================================================
# Staffora Platform - Stale Issue & PR Cleanup
# =============================================================================

name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 8am UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale Issues & PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
          close-issue-message: 'This issue was closed because it has been stale for 14 days with no activity.'
          close-pr-message: 'This PR was closed because it has been stale for 7 days with no activity.'
          days-before-stale: 30
          days-before-close: 14
          days-before-pr-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,bug,critical'
          exempt-pr-labels: 'pinned,security,dependencies'
          operations-per-run: 50
