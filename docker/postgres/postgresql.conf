# =============================================================================
# Staffora Platform PostgreSQL Tuning Configuration
# =============================================================================
# Optimized for a 2GB container running PostgreSQL 16.
# Mounted via docker-compose.yml as /etc/postgresql/postgresql.conf.
# =============================================================================

# -----------------------------------------------------------------------------
# Memory
# -----------------------------------------------------------------------------
shared_buffers = 512MB
work_mem = 4MB
effective_cache_size = 1536MB
maintenance_work_mem = 256MB
wal_buffers = 16MB

# -----------------------------------------------------------------------------
# Connections
# -----------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 100

# -----------------------------------------------------------------------------
# Query Planner
# -----------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# -----------------------------------------------------------------------------
# Parallelism
# -----------------------------------------------------------------------------
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_worker_processes = 8

# -----------------------------------------------------------------------------
# WAL (Write-Ahead Log)
# -----------------------------------------------------------------------------
wal_level = replica
min_wal_size = 1GB
max_wal_size = 4GB

# -----------------------------------------------------------------------------
# WAL Archiving (Point-in-Time Recovery)
# -----------------------------------------------------------------------------
# Enable WAL archiving so completed WAL segments are copied to an archive
# volume. Combined with periodic pg_dump base backups, this enables
# point-in-time recovery (PITR) to any moment between base backups.
#
# The archive_command copies each completed WAL segment to /wal-archive/.
# The test (-f) prevents overwriting an existing segment (crash safety).
# See Docs/operations/point-in-time-recovery.md for the full recovery procedure.
archive_mode = on
archive_command = 'test ! -f /wal-archive/%f && cp %p /wal-archive/%f'
archive_timeout = 300

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
log_min_duration_statement = 200
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0

# -----------------------------------------------------------------------------
# Autovacuum
# -----------------------------------------------------------------------------
autovacuum_max_workers = 3
autovacuum_naptime = 60
