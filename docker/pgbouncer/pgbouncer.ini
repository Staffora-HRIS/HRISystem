; =============================================================================
; Staffora Platform PgBouncer Configuration
; =============================================================================
; PgBouncer sits between the application (API, worker) and PostgreSQL to
; provide lightweight connection pooling.  This reduces PostgreSQL backend
; connections while supporting hundreds of concurrent application connections.
;
; Mode: transaction — connections are returned to the pool after each
; transaction, which is safe for Staffora because RLS context is set inside
; every transaction via app.set_tenant_context().
;
; IMPORTANT: Transaction-mode pooling means server-side prepared statements
; are NOT supported.  Both postgres.js and the pg Pool used by Better Auth
; must disable prepared statements when connecting through PgBouncer.
; =============================================================================

[databases]
; Route all connections for the "hris" database to the PostgreSQL container.
; The hostname "postgres" is resolved by Docker networking.
hris = host=postgres port=5432 dbname=hris

[pgbouncer]
; ---------------------------------------------------------------------------
; Listening
; ---------------------------------------------------------------------------
listen_addr = 0.0.0.0
listen_port = 6432

; ---------------------------------------------------------------------------
; Authentication
; ---------------------------------------------------------------------------
; userlist.txt contains "user" "md5hash" or "user" "password" pairs.
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; ---------------------------------------------------------------------------
; Pool Mode
; ---------------------------------------------------------------------------
; transaction: connections are returned to the pool after each transaction.
; This is the safest mode for multi-tenant RLS because set_tenant_context()
; is called inside every transaction, so no tenant context leaks between
; requests.
pool_mode = transaction

; ---------------------------------------------------------------------------
; Connection Limits
; ---------------------------------------------------------------------------
; Maximum client connections PgBouncer will accept.
; This should be well above the sum of API + worker + Better Auth pools.
max_client_conn = 200

; Default pool size per user/database pair.
; This is the number of PostgreSQL backend connections PgBouncer will open.
; Should be less than PostgreSQL max_connections (100) to leave headroom
; for superuser/migration connections.
default_pool_size = 25

; Minimum pool size — keep connections warm to avoid latency spikes.
min_pool_size = 5

; Reserve connections for superuser (hris) — used by migrations, admin.
reserve_pool_size = 5

; How long to wait (seconds) before using a reserve pool connection.
reserve_pool_timeout = 3

; Maximum number of backend connections per database (across all users).
; Leaves room for direct superuser connections that bypass PgBouncer.
max_db_connections = 60

; Maximum number of backend connections per user.
max_user_connections = 40

; ---------------------------------------------------------------------------
; Timeouts
; ---------------------------------------------------------------------------
; Close server connection if it has been idle for this many seconds.
server_idle_timeout = 300

; Cancel queries running longer than this (seconds).  0 = no limit.
query_timeout = 120

; Drop client connection if it has been idle in transaction for this long.
; Prevents clients from holding connections open indefinitely.
client_idle_timeout = 600

; How long to wait for a connection from the pool (seconds).
; If exceeded, client gets an error rather than waiting forever.
server_connect_timeout = 15

; Time to wait for a response from the server on login (seconds).
server_login_retry = 3

; ---------------------------------------------------------------------------
; Transaction-mode safety
; ---------------------------------------------------------------------------
; Reset session state when returning connections to the pool.
; DISCARD ALL resets search_path, prepared statements, temp tables, etc.
; This is critical for multi-tenant RLS — prevents tenant context leakage.
server_reset_query = DISCARD ALL

; ---------------------------------------------------------------------------
; Logging
; ---------------------------------------------------------------------------
; Log to stdout for Docker log collection.
; PgBouncer 1.23+ uses "logfile"; older versions used "log_file".
logfile = /dev/null

; Log connections/disconnections for debugging.
log_connections = 1
log_disconnections = 1

; Log DNS resolution issues.
log_pooler_errors = 1

; Syslog is disabled — Docker captures stdout.
syslog = 0

; ---------------------------------------------------------------------------
; Admin
; ---------------------------------------------------------------------------
; Admin console is accessible via psql to the pgbouncer virtual database.
; Only the stats_users can view statistics; admin_users can reload config.
admin_users = hris
stats_users = hris

; ---------------------------------------------------------------------------
; TLS (disabled — internal Docker network only)
; ---------------------------------------------------------------------------
; In production with PgBouncer exposed outside the Docker network, enable:
; client_tls_sslmode = require
; client_tls_cert_file = /etc/pgbouncer/server.crt
; client_tls_key_file = /etc/pgbouncer/server.key
