# =============================================================================
# Staffora Platform Nginx Configuration (Production)
# =============================================================================
# Supports horizontal scaling of API servers via Docker Compose replicas.
#
# Architecture:
#   Client -> Nginx (load balancer) -> N x API instances (port 3000)
#   All API instances are stateless:
#     - Sessions stored in PostgreSQL (via Better Auth)
#     - Idempotency keys stored in Redis/PostgreSQL
#     - Cache backed by Redis
#   No session affinity (sticky sessions) is required.
#
# Scaling:
#   docker compose -f docker/docker-compose.yml up -d --scale api=3
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.scale.yml up -d
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format — includes upstream address to identify which API instance
    # handled the request (useful for debugging load balancer distribution)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'upstream="$upstream_addr"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # -------------------------------------------------------------------------
    # DNS Resolver — Docker's Embedded DNS
    # -------------------------------------------------------------------------
    # Docker Compose provides an embedded DNS server at 127.0.0.11 that
    # resolves service names to container IPs. When api is scaled to N
    # replicas, "api" resolves to N IP addresses.
    #
    # valid=10s: Re-resolve every 10 seconds to discover new/removed instances.
    # ipv6=off: Docker bridge networks use IPv4 only.
    # -------------------------------------------------------------------------
    resolver 127.0.0.11 valid=10s ipv6=off;

    # -------------------------------------------------------------------------
    # API Backend Upstream — Load Balancing
    # -------------------------------------------------------------------------
    # Docker Compose DNS resolves "api" to all container IPs when replicas > 1.
    # The upstream block uses the Docker service name. When combined with the
    # resolver directive above, nginx re-resolves DNS periodically to discover
    # newly scaled instances.
    #
    # Load balancing strategy: least_conn
    #   Distributes requests to the instance with the fewest active connections.
    #   This is optimal for API workloads with varying request durations
    #   (e.g., fast reads vs. slower report generation).
    #
    # No sticky sessions needed — the API is fully stateless:
    #   - Sessions: PostgreSQL (Better Auth session table)
    #   - Cache: Redis (shared across all instances)
    #   - Idempotency: Redis + PostgreSQL (shared across all instances)
    # -------------------------------------------------------------------------
    upstream api_backend {
        least_conn;
        server api:3000;
        keepalive 64;
        keepalive_timeout 60s;
    }

    upstream web_backend {
        server web:5173;
        keepalive 16;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name _;

        # Health check endpoint (no redirect)
        location /health {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # Modern SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Connection limits
        limit_conn conn_limit 50;

        # Client body size (for file uploads)
        client_max_body_size 50M;

        # API routes
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Retry on connection failures — allows transparent failover
            # when an API instance is restarting during a rolling update.
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Don't buffer API responses
            proxy_buffering off;

            # Expose which upstream instance handled the request (debug header)
            add_header X-Upstream-Instance $upstream_addr always;
        }

        # Auth endpoints (stricter rate limiting)
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Auth endpoint failover — only retry on connection errors, not
            # on HTTP errors, to avoid double-submitting login attempts.
            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 2;
        }

        # Health check (no rate limiting) — used by external load balancers
        location /health {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Ready/Live checks — used by orchestrators (Kubernetes, Docker Swarm)
        location ~ ^/(ready|live)$ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # API docs
        location /docs {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # WebSocket support for hot reload in development
        location /ws {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Frontend (everything else)
        location / {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                proxy_pass http://web_backend;
                proxy_cache_valid 200 1d;
                add_header Cache-Control "public, max-age=86400";
            }
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
