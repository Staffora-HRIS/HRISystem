# =============================================================================
# Staffora Platform Nginx Configuration (Production)
# =============================================================================
# Supports horizontal scaling of API servers via Docker Compose replicas.
#
# Architecture:
#   Client -> Nginx (load balancer + cache) -> N x API instances (port 3000)
#   Client -> Nginx (cache) -> Web SSR server (port 5173)
#   All API instances are stateless:
#     - Sessions stored in PostgreSQL (via Better Auth)
#     - Idempotency keys stored in Redis/PostgreSQL
#     - Cache backed by Redis
#   No session affinity (sticky sessions) is required.
#
# TLS:
#   Certificates are provisioned and renewed automatically by certbot
#   using HTTP-01 challenges. See Docs/operations/ssl-certificates.md.
#
# Caching strategy:
#   - Hashed static assets (/assets/*): immutable, 1-year max-age
#   - HTML responses: no-cache (must revalidate on every request)
#   - API responses: optional short-TTL proxy cache for public endpoints
#   - Fonts/images: 30-day max-age with ETag validation
#
# Scaling:
#   docker compose -f docker/docker-compose.yml up -d --scale api=3
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.scale.yml up -d
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------------------------
    # Proxy Cache Configuration (cache zones, keys, bypass rules)
    # -------------------------------------------------------------------------
    include /etc/nginx/cache.conf;

    # Logging format — includes upstream address to identify which API instance
    # handled the request (useful for debugging load balancer distribution)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'upstream="$upstream_addr" cache="$upstream_cache_status"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    # Compress responses above 1 KB. Below that, compression overhead exceeds
    # the bandwidth saving. Level 6 provides a good balance of CPU vs ratio.
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-font-opentype
        font/opentype
        font/woff2
        image/svg+xml
        image/x-icon;

    # Do not gzip responses that are already small or pre-compressed
    gzip_disable "msie6";

    # -------------------------------------------------------------------------
    # Brotli Compression (pre-compressed static files)
    # -------------------------------------------------------------------------
    # If ngx_brotli module is available, enable on-the-fly Brotli compression.
    # Falls back to serving .br pre-compressed files via gzip_static-style
    # approach using the brotli_static directive.
    #
    # Note: The default nginx:alpine image does not include ngx_brotli.
    # To enable Brotli, either:
    #   1. Use a custom nginx image with ngx_brotli compiled in
    #   2. Pre-compress assets at build time (.br files) and use brotli_static
    #   3. Use fholzer/nginx-brotli:latest as the base image
    #
    # When using pre-compressed files (option 2), Vite can generate .br files
    # with the vite-plugin-compression plugin. Nginx will serve them when the
    # client sends Accept-Encoding: br.
    # -------------------------------------------------------------------------
    # Uncomment the following lines when using an nginx image with ngx_brotli:
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types
    #     text/plain
    #     text/css
    #     text/xml
    #     text/javascript
    #     application/json
    #     application/javascript
    #     application/xml
    #     application/xml+rss
    #     font/opentype
    #     font/woff2
    #     image/svg+xml;
    # brotli_static on;

    # -------------------------------------------------------------------------
    # Security Headers (applied globally)
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # -------------------------------------------------------------------------
    # Rate Limiting Zones
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # -------------------------------------------------------------------------
    # DNS Resolver — Docker's Embedded DNS
    # -------------------------------------------------------------------------
    # Docker Compose provides an embedded DNS server at 127.0.0.11 that
    # resolves service names to container IPs. When api is scaled to N
    # replicas, "api" resolves to N IP addresses.
    #
    # valid=10s: Re-resolve every 10 seconds to discover new/removed instances.
    # ipv6=off: Docker bridge networks use IPv4 only.
    # -------------------------------------------------------------------------
    resolver 127.0.0.11 valid=10s ipv6=off;

    # -------------------------------------------------------------------------
    # API Backend Upstream — Load Balancing
    # -------------------------------------------------------------------------
    # Docker Compose DNS resolves "api" to all container IPs when replicas > 1.
    # The upstream block uses the Docker service name. When combined with the
    # resolver directive above, nginx re-resolves DNS periodically to discover
    # newly scaled instances.
    #
    # Load balancing strategy: least_conn
    #   Distributes requests to the instance with the fewest active connections.
    #   This is optimal for API workloads with varying request durations
    #   (e.g., fast reads vs. slower report generation).
    #
    # No sticky sessions needed — the API is fully stateless:
    #   - Sessions: PostgreSQL (Better Auth session table)
    #   - Cache: Redis (shared across all instances)
    #   - Idempotency: Redis + PostgreSQL (shared across all instances)
    # -------------------------------------------------------------------------
    upstream api_backend {
        least_conn;
        server api:3000;
        keepalive 64;
        keepalive_timeout 60s;
    }

    upstream web_backend {
        server web:5173;
        keepalive 16;
    }

    # =========================================================================
    # HTTP Server — ACME Challenges + HTTPS Redirect
    # =========================================================================
    # This server block serves two purposes:
    #   1. Serves Let's Encrypt HTTP-01 challenge files from the certbot
    #      webroot so certificates can be issued and renewed without downtime.
    #   2. Redirects all other HTTP traffic to HTTPS.
    #
    # The .well-known/acme-challenge/ location MUST be served over plain HTTP
    # (port 80) — Let's Encrypt requires it for domain validation.
    # =========================================================================
    server {
        listen 80;
        server_name staffora.co.uk api.staffora.co.uk;

        # Let's Encrypt HTTP-01 challenge endpoint.
        # Certbot places challenge tokens in /var/www/certbot/.well-known/acme-challenge/
        # and Let's Encrypt validates domain ownership by requesting them over HTTP.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        # Health check endpoint (no redirect, used by load balancers/monitoring)
        location /health {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS Server — staffora.co.uk (Main Application)
    # =========================================================================
    # Serves the web frontend and proxies API requests to the backend.
    # TLS certificates are provisioned by Let's Encrypt via certbot.
    #
    # Certificate paths:
    #   /etc/letsencrypt/live/staffora.co.uk/fullchain.pem
    #   /etc/letsencrypt/live/staffora.co.uk/privkey.pem
    #
    # These are symlinks managed by certbot pointing to the latest certificate.
    # After renewal, nginx is reloaded via certbot's deploy hook.
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name staffora.co.uk;

        # -----------------------------------------------------------------
        # SSL Certificate — Let's Encrypt (managed by certbot)
        # -----------------------------------------------------------------
        # These paths point into the certbot volume. On first run, the
        # init-letsencrypt.sh script creates a temporary self-signed cert
        # so nginx can start and serve ACME challenges. Once certbot
        # obtains real certificates, nginx is reloaded.
        #
        # Fallback: If not using certbot, place self-signed or purchased
        # certificates at /etc/nginx/ssl/cert.pem and key.pem and change
        # these paths accordingly.
        # -----------------------------------------------------------------
        ssl_certificate /etc/letsencrypt/live/staffora.co.uk/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staffora.co.uk/privkey.pem;

        # Recommended TLS parameters from certbot (downloaded by init script)
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # HSTS — tell browsers to always use HTTPS for this domain.
        # max-age=63072000 = 2 years. includeSubDomains covers api.staffora.co.uk.
        # preload: submit to https://hstspreload.org/ after confirming everything works.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Connection limits
        limit_conn conn_limit 50;

        # Client body size (for file uploads)
        client_max_body_size 50M;

        # -----------------------------------------------------------------
        # API Routes — Proxy to backend with optional response caching
        # -----------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Retry on connection failures — allows transparent failover
            # when an API instance is restarting during a rolling update.
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Proxy cache for API responses (short TTL, public endpoints only).
            # Authenticated requests bypass cache via $cache_bypass (see cache.conf).
            proxy_cache api_cache_zone;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 60s;
            proxy_cache_valid 404 10s;
            proxy_cache_bypass $cache_bypass;
            proxy_no_cache $cache_bypass $no_cache_set_cookie;
            add_header X-Cache-Status $upstream_cache_status always;

            # Buffer API responses for cache storage
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;

            # Expose which upstream instance handled the request (debug header)
            add_header X-Upstream-Instance $upstream_addr always;
        }

        # Auth endpoints (stricter rate limiting, never cached)
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Auth endpoint failover — only retry on connection errors, not
            # on HTTP errors, to avoid double-submitting login attempts.
            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 2;

            # Never cache auth responses
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # Better Auth endpoints (same strict treatment)
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 2;

            # Never cache auth responses
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # Health check (no rate limiting) — used by external load balancers
        location /health {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Ready/Live checks — used by orchestrators (Kubernetes, Docker Swarm)
        location ~ ^/(ready|live)$ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # API docs
        location /docs {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # WebSocket support for hot reload in development
        location /ws {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # -----------------------------------------------------------------
        # Hashed Static Assets — Immutable, long-lived cache
        # -----------------------------------------------------------------
        # React Router / Vite produces content-hashed filenames under
        # /assets/ (e.g., /assets/index-B3k9f2Lq.js). Because the hash
        # changes whenever the file content changes, these can be cached
        # indefinitely. "immutable" tells browsers and CDNs to never
        # revalidate (no conditional GETs).
        # -----------------------------------------------------------------
        location /assets/ {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";

            # Proxy-level cache for static assets
            proxy_cache static_cache_zone;
            proxy_cache_key "$scheme$request_uri";
            proxy_cache_valid 200 7d;

            # Immutable cache header — 1 year (365 days = 31536000 seconds)
            add_header Cache-Control "public, max-age=31536000, immutable" always;

            # Preserve security headers in this location block
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Cache-Status $upstream_cache_status always;

            # Enable serving of pre-compressed gzip files (.gz) if available
            # This avoids runtime compression CPU cost
            gzip_static on;

            # Uncomment when using nginx with brotli module:
            # brotli_static on;

            # CORS for font files loaded from assets
            location ~* \.(woff2?|ttf|otf|eot)$ {
                proxy_pass http://web_backend;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header Connection "";

                add_header Cache-Control "public, max-age=31536000, immutable" always;
                add_header Access-Control-Allow-Origin "*" always;
                add_header X-Content-Type-Options "nosniff" always;

                proxy_cache static_cache_zone;
                proxy_cache_key "$scheme$request_uri";
                proxy_cache_valid 200 7d;
            }
        }

        # -----------------------------------------------------------------
        # Non-hashed static files (favicon, robots.txt, manifest, icons)
        # -----------------------------------------------------------------
        # These files do not have content hashes in their filenames, so
        # use a shorter max-age with ETag validation.
        # -----------------------------------------------------------------
        location ~* ^/(favicon\.ico|robots\.txt|manifest\.webmanifest|site\.webmanifest|browserconfig\.xml)$ {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";

            add_header Cache-Control "public, max-age=86400, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;

            proxy_cache static_cache_zone;
            proxy_cache_key "$scheme$request_uri";
            proxy_cache_valid 200 1d;
        }

        # -----------------------------------------------------------------
        # Frontend — SSR HTML Responses (no-cache, must revalidate)
        # -----------------------------------------------------------------
        # HTML pages are server-rendered and may contain user-specific or
        # CSRF-token-specific content. They must never be served from a
        # stale cache. "no-cache" means the browser will revalidate with
        # the server on every navigation, but can still use conditional
        # requests (If-None-Match / If-Modified-Since) for 304 responses.
        # -----------------------------------------------------------------
        location / {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # HTML must always be revalidated — never serve stale HTML
            add_header Cache-Control "no-cache" always;
            add_header X-Content-Type-Options "nosniff" always;

            # Do not proxy-cache HTML responses (they may contain session data)
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # =========================================================================
    # HTTPS Server — api.staffora.co.uk (API Subdomain)
    # =========================================================================
    # Dedicated server block for the API subdomain. All requests are proxied
    # to the API backend. This enables API consumers to use a clean URL
    # (https://api.staffora.co.uk/v1/...) without the /api prefix.
    #
    # Uses the same SAN certificate as the main domain.
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name api.staffora.co.uk;

        # SSL — same certificate covers both domains (SAN certificate)
        ssl_certificate /etc/letsencrypt/live/staffora.co.uk/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staffora.co.uk/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Connection limits
        limit_conn conn_limit 50;

        # Client body size (for file uploads)
        client_max_body_size 50M;

        # Health check
        location /health {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Auth endpoints (stricter rate limiting, never cached)
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 2;

            # Never cache auth responses
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # All API routes
        location / {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Proxy cache for API responses (same rules as main server)
            proxy_cache api_cache_zone;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 60s;
            proxy_cache_valid 404 10s;
            proxy_cache_bypass $cache_bypass;
            proxy_no_cache $cache_bypass $no_cache_set_cookie;
            add_header X-Cache-Status $upstream_cache_status always;

            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;

            add_header X-Upstream-Instance $upstream_addr always;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
