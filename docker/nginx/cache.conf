# =============================================================================
# Staffora Platform — Proxy Cache Configuration
# =============================================================================
# Included from nginx.conf to configure upstream response caching.
#
# This file defines:
#   - Proxy cache storage path and memory zone
#   - Cache key composition
#   - Bypass rules for authenticated and dynamic requests
#
# Cache hierarchy:
#   1. Browser cache (Cache-Control headers on static assets)
#   2. Nginx proxy cache (this config — caches upstream responses)
#   3. Upstream server (API or SSR web server)
#
# =============================================================================

# -----------------------------------------------------------------------------
# Proxy Cache Path
# -----------------------------------------------------------------------------
# levels=1:2  — Two-level directory hierarchy to avoid too many files per dir
# keys_zone   — Shared memory zone for cache keys (10 MB holds ~80,000 keys)
# max_size    — Maximum disk usage for cached responses
# inactive    — Evict entries not accessed within this window
# use_temp_path=off — Write directly to cache dir (avoids cross-device rename)
# -----------------------------------------------------------------------------
proxy_cache_path /var/cache/nginx/api_cache
    levels=1:2
    keys_zone=api_cache_zone:10m
    max_size=256m
    inactive=10m
    use_temp_path=off;

proxy_cache_path /var/cache/nginx/static_cache
    levels=1:2
    keys_zone=static_cache_zone:10m
    max_size=1g
    inactive=7d
    use_temp_path=off;

# -----------------------------------------------------------------------------
# Cache Key Definition
# -----------------------------------------------------------------------------
# The default cache key includes scheme, proxy_host, and request_uri.
# We add $http_accept_encoding so gzip/brotli variants are cached separately.
# For API requests, the tenant context is part of the auth session, so
# unauthenticated public endpoints can share cache entries across origins.
# -----------------------------------------------------------------------------

# Map: determine whether to bypass cache based on request characteristics.
# Authenticated requests (with session cookies or Authorization headers) must
# not be served from cache to prevent cross-user data leakage.
map $http_authorization $cache_bypass_auth {
    default 0;
    "~."    1;
}

map $cookie_better_auth_session $cache_bypass_session {
    default 0;
    "~."    1;
}

# Combine bypass signals: any non-zero value triggers bypass
map "$cache_bypass_auth$cache_bypass_session" $cache_bypass {
    default 0;
    "~1"    1;
}

# Map: do not cache responses that include Set-Cookie headers.
# This prevents caching personalised responses.
map $upstream_http_set_cookie $no_cache_set_cookie {
    default 0;
    "~."    1;
}
