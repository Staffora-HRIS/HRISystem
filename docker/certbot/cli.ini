# =============================================================================
# Certbot CLI Configuration for Staffora Platform
# =============================================================================
# This file is mounted into the certbot container and provides default options
# for certificate renewal. Certbot reads this automatically from /etc/letsencrypt.
#
# Renewal runs every 12 hours via the container entrypoint. Certbot only
# attempts renewal when a certificate is within 30 days of expiry (default).
#
# Manual renewal:
#   docker compose --profile production exec certbot certbot renew --dry-run
#
# Force renewal:
#   docker compose --profile production exec certbot certbot renew --force-renewal
# =============================================================================

# Use the webroot authenticator so nginx can keep running during renewal.
# Certbot places challenge files in /var/www/certbot/.well-known/acme-challenge/
# and nginx serves them via the location block in nginx.conf.
authenticator = webroot
webroot-path = /var/www/certbot

# Agree to the Let's Encrypt Terms of Service automatically.
agree-tos = true

# Suppress interactive prompts (required for automated renewal).
non-interactive = true

# Keep existing certificates when renewing (do not replace with new key pair).
keep-until-expiring = true

# RSA key size. 4096 provides stronger security at minimal performance cost
# since TLS handshakes are infrequent relative to connection reuse.
rsa-key-size = 4096

# Preferred chain: use the ISRG Root X1 chain for maximum compatibility.
# This avoids issues with the expired DST Root CA X3 cross-sign.
preferred-chain = ISRG Root X1

# Maximum number of log backups to keep. Prevents unbounded disk usage.
max-log-backups = 10

# Deploy hook: reload nginx after successful renewal so it picks up new certs.
# This runs only when a certificate is actually renewed, not on every check.
deploy-hook = nginx -s reload || true
