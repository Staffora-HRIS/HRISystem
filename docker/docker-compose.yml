# =============================================================================
# Staffora Platform Docker Compose Configuration
# =============================================================================
#
# Usage:
#   Development:    docker compose up -d
#   Production:     docker compose --profile production up -d
#   Monitoring:     docker compose --profile monitoring up -d
#   Scanning:       docker compose --profile scanning up -d
#   Uptime:         docker compose --profile uptime up -d
#   Scaled (3 API): docker compose --profile production up -d --scale api=3
#
# Profiles:
#   - default: Core services for development (postgres, pgbouncer, redis, api, worker, web, backup)
#   - production: Production-optimized configuration with nginx load balancer
#   - monitoring: Full observability stack (Loki, Promtail, Prometheus, Grafana, exporters)
#   - scanning: ClamAV virus scanning for document uploads
#   - uptime: Uptime Kuma self-hosted uptime monitoring and status page
#
# Monitoring Stack (--profile monitoring):
#   Adds log aggregation (Loki + Promtail) and metrics (Prometheus + exporters)
#   with Grafana dashboards. All container logs are collected automatically via
#   Promtail's Docker socket discovery. Structured JSON logs from API/worker
#   (Pino) are parsed for level, requestId, tenantId, and other fields.
#
#   Grafana:    http://localhost:3100 (admin/staffora)
#   Prometheus: http://localhost:9090
#   Loki API:   http://localhost:3101
#
# Horizontal Scaling:
#   The API service is stateless and can be scaled to multiple instances.
#   Use --scale api=N or the docker-compose.scale.yml override file.
#   See docker/SCALING.md for full documentation.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: staffora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hris_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-hris}
      # Production: Tune shared_buffers, work_mem via postgres.conf
    entrypoint: ["/scripts/entrypoint-wrapper.sh"]
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_wal_archive:/wal-archive
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/entrypoint-wrapper.sh:/scripts/entrypoint-wrapper.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hris} -d ${POSTGRES_DB:-hris}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # PgBouncer Connection Pooler
  # ---------------------------------------------------------------------------
  # Sits between the application and PostgreSQL to multiplex connections.
  # Transaction-mode pooling: connections returned to pool after each TX.
  # This is safe because RLS context is set per-transaction via
  # app.set_tenant_context().
  #
  # Architecture:
  #   API/Worker --[max_client_conn=200]--> PgBouncer --[pool_size=20]--> PostgreSQL
  #
  # Direct PostgreSQL access (bypassing PgBouncer) is preserved for:
  #   - Migrations (DATABASE_URL still points to postgres:5432)
  #   - Backup sidecar
  #   - Admin/superuser connections
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    container_name: staffora-pgbouncer
    restart: unless-stopped
    environment:
      # These env vars are NOT used by the config file (pgbouncer.ini is
      # mounted directly), but are documented here for reference.
      DATABASE_URL: postgres://${POSTGRES_APP_USER:-hris_app}:${POSTGRES_APP_PASSWORD:-hris_dev_password}@postgres:5432/${POSTGRES_DB:-hris}
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_APP_USER:-hris_app} -d hris || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis Cache & Queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7
    container_name: staffora-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-staffora_redis_dev}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-staffora_redis_dev} --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # API Server (Horizontally Scalable)
  # ---------------------------------------------------------------------------
  # The API is fully stateless — sessions are in PostgreSQL (Better Auth),
  # cache and idempotency keys are in Redis. No session affinity required.
  #
  # Scale with:
  #   docker compose up -d --scale api=3
  #   docker compose -f docker-compose.yml -f docker-compose.scale.yml up -d
  #
  # NOTE: container_name is intentionally omitted to allow multiple replicas.
  #       Docker generates unique names (e.g., docker-api-1, docker-api-2).
  # NOTE: Host port binding uses a range so multiple instances don't conflict.
  #       Access the API via nginx reverse proxy (port 80/443) in production.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: packages/api/Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-development}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      # DATABASE_APP_URL routes through PgBouncer (port 6432) for connection pooling.
      # Uses hris_app (NOBYPASSRLS) — RLS enforced at runtime.
      DATABASE_APP_URL: postgres://${POSTGRES_APP_USER:-hris_app}:${POSTGRES_APP_PASSWORD:-hris_dev_password}@pgbouncer:6432/${POSTGRES_DB:-hris}
      # DATABASE_URL connects directly to PostgreSQL (bypasses PgBouncer).
      # Used for migrations and superuser operations only.
      DATABASE_URL: postgres://${POSTGRES_USER:-hris}:${POSTGRES_PASSWORD:-hris_dev_password}@postgres:5432/${POSTGRES_DB:-hris}
      REDIS_URL: redis://:${REDIS_PASSWORD:-staffora_redis_dev}@redis:6379
      SESSION_SECRET: ${SESSION_SECRET:-dev_session_secret_32chars_min}
      CSRF_SECRET: ${CSRF_SECRET:-dev_csrf_secret_32chars_min}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev_better_auth_secret_32chars}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_API_KEY: ${BETTER_AUTH_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60000}
      # ClamAV virus scanning (optional, requires 'scanning' profile)
      CLAMAV_ENABLED: ${CLAMAV_ENABLED:-false}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      CLAMAV_TIMEOUT: ${CLAMAV_TIMEOUT:-30000}
      # OpenTelemetry distributed tracing (optional, requires 'monitoring' profile with tempo)
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_SERVICE_NAME: staffora-api
      OTEL_SERVICE_VERSION: "0.1.0"
      OTEL_SAMPLE_RATE: ${OTEL_SAMPLE_RATE:-}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-}
      OTEL_CONSOLE_EXPORTER: ${OTEL_CONSOLE_EXPORTER:-false}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Background Worker
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ..
      dockerfile: packages/api/Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-development}
    container_name: staffora-worker
    restart: unless-stopped
    command: ["bun", "run", "packages/api/src/worker.ts"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # DATABASE_APP_URL routes through PgBouncer for connection pooling.
      DATABASE_APP_URL: postgres://${POSTGRES_APP_USER:-hris_app}:${POSTGRES_APP_PASSWORD:-hris_dev_password}@pgbouncer:6432/${POSTGRES_DB:-hris}
      # DATABASE_URL connects directly to PostgreSQL for migrations/superuser ops.
      DATABASE_URL: postgres://${POSTGRES_USER:-hris}:${POSTGRES_PASSWORD:-hris_dev_password}@postgres:5432/${POSTGRES_DB:-hris}
      REDIS_URL: redis://:${REDIS_PASSWORD:-staffora_redis_dev}@redis:6379
      WORKER_TYPE: all
      WORKER_HEALTH_PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Email configuration for notification worker
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@staffora.co.uk}
      # Storage configuration for export worker
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_PATH: ${STORAGE_PATH:-/app/uploads}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      # ClamAV virus scanning (optional, requires 'scanning' profile)
      CLAMAV_ENABLED: ${CLAMAV_ENABLED:-false}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      CLAMAV_TIMEOUT: ${CLAMAV_TIMEOUT:-30000}
      # OpenTelemetry distributed tracing (optional, requires 'monitoring' profile with tempo)
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_SERVICE_NAME: staffora-worker
      OTEL_SERVICE_VERSION: "0.1.0"
      OTEL_SAMPLE_RATE: ${OTEL_SAMPLE_RATE:-}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-}
      OTEL_CONSOLE_EXPORTER: ${OTEL_CONSOLE_EXPORTER:-false}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - staffora-network
    volumes:
      - worker_uploads:/app/uploads
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Web Frontend
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: packages/web/Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-development}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: staffora-web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      # Use Docker service name (not container_name) for internal routing.
      # Docker DNS resolves "api" to any healthy container, enabling load balancing
      # when the API service is scaled to multiple replicas.
      INTERNAL_API_URL: http://api:3000
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5173/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Database Backup Sidecar
  # ---------------------------------------------------------------------------
  # Runs pg_dump on a schedule and optionally uploads to S3.
  # Set S3_BACKUP_BUCKET to enable offsite backups.
  #
  # Manual backup:      docker exec staffora-backup /scripts/backup-db.sh
  # List S3 backups:    docker exec staffora-backup /scripts/restore-from-s3.sh --list
  # Verify latest:      ./docker/scripts/verify-backup.sh --latest  (from host)
  # Verify (in-sidecar) requires Docker socket mount — see backup-verification.md
  # ---------------------------------------------------------------------------
  backup:
    image: postgres:16
    container_name: staffora-backup
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/scripts/backup-entrypoint.sh"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hris}
      POSTGRES_USER: ${POSTGRES_USER:-hris}
      PGPASSWORD: ${POSTGRES_PASSWORD:-hris_dev_password}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      # Cron expression for backup schedule (default: daily at 02:00)
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      # Set to "true" to run a backup immediately on container start
      BACKUP_ON_START: ${BACKUP_ON_START:-false}
      # S3 offsite backup configuration (all optional -- omit to use local-only backups)
      S3_BACKUP_BUCKET: ${S3_BACKUP_BUCKET:-}
      S3_BACKUP_PREFIX: ${S3_BACKUP_PREFIX:-backups/staffora/}
      S3_BACKUP_STORAGE_CLASS: ${S3_BACKUP_STORAGE_CLASS:-STANDARD_IA}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # S3 retention policy
      S3_DAILY_RETENTION: ${S3_DAILY_RETENTION:-30}
      S3_WEEKLY_RETENTION: ${S3_WEEKLY_RETENTION:-90}
      S3_MONTHLY_RETENTION: ${S3_MONTHLY_RETENTION:-365}
      # Backup verification (false=off, true/always=every backup, weekly=once per week)
      VERIFY_BACKUP: ${VERIFY_BACKUP:-weekly}
      # Day of week to run weekly verification (1=Monday ... 7=Sunday)
      VERIFY_BACKUP_DAY: ${VERIFY_BACKUP_DAY:-7}
    volumes:
      - backup_data:/backups
      - postgres_wal_archive:/wal-archive:ro
      - ./scripts/backup-entrypoint.sh:/scripts/backup-entrypoint.sh:ro
      - ./scripts/backup-db.sh:/scripts/backup-db.sh:ro
      - ./scripts/backup-s3-cleanup.sh:/scripts/backup-s3-cleanup.sh:ro
      - ./scripts/restore-from-s3.sh:/scripts/restore-from-s3.sh:ro
      - ./scripts/verify-backup.sh:/scripts/verify-backup.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # ClamAV Virus Scanner (Optional)
  # ---------------------------------------------------------------------------
  # Provides on-demand virus scanning for uploaded documents.
  # Enable by setting CLAMAV_ENABLED=true in your .env file.
  #
  # Usage:
  #   docker compose --profile scanning up -d
  #   # Or include in default profile by uncommenting the profiles section below
  #
  # First startup downloads virus definitions (~300MB) and may take several
  # minutes before the service becomes healthy.
  # ---------------------------------------------------------------------------
  clamav:
    image: clamav/clamav:1.4
    container_name: staffora-clamav
    restart: unless-stopped
    profiles:
      - scanning
    ports:
      - "${CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc localhost 3310 | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Uptime Kuma -- Self-hosted Uptime Monitoring (Optional)
  # ---------------------------------------------------------------------------
  # Provides HTTP/TCP uptime monitoring, SSL certificate expiry checks,
  # alerting (Slack, email, PagerDuty), and a public status page.
  #
  # Enable with: docker compose --profile uptime up -d
  #
  # Dashboard: http://localhost:3002
  # Port 3002 is used because the worker health endpoint occupies port 3001.
  #
  # See Docs/operations/uptime-monitoring.md for monitor configuration guide.
  # ---------------------------------------------------------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: staffora-uptime-kuma
    restart: unless-stopped
    profiles:
      - uptime
    ports:
      - "${UPTIME_KUMA_PORT:-3002}:3001"
    volumes:
      - uptime_kuma_data:/app/data
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const r=http.get('http://localhost:3001/api/entry-page',{timeout:5000},s=>{process.exit(s.statusCode===200?0:1)});r.on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Production-Only Services
  # ---------------------------------------------------------------------------

  # Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: staffora-nginx
    restart: unless-stopped
    profiles:
      - production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/cache.conf:/etc/nginx/cache.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      # Let's Encrypt certificate volume (shared with certbot, read-only for nginx)
      - certbot_conf:/etc/letsencrypt:ro
      # ACME challenge webroot (shared with certbot, read-only for nginx)
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - api
      - web
    # Run nginx in foreground. A background loop reloads the config every
    # 6 hours so renewed certificates are picked up even if certbot's
    # deploy hook fails. The trap ensures clean shutdown on SIGTERM.
    command: >
      /bin/sh -c '
        trap "nginx -s quit; exit 0" TERM INT;
        nginx -g "daemon off;" &
        while :; do sleep 6h; nginx -s reload; done &
        wait
      '
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Certbot — Automated TLS Certificate Management
  # ---------------------------------------------------------------------------
  # Provisions and renews Let's Encrypt TLS certificates using HTTP-01 challenges.
  # Shares two volumes with nginx:
  #   - certbot_conf:    Certificate files at /etc/letsencrypt
  #   - certbot_webroot: ACME challenge webroot at /var/www/certbot
  #
  # First-time setup:
  #   ./scripts/init-letsencrypt.sh
  #
  # The container runs a renewal check every 12 hours. Certbot only contacts
  # Let's Encrypt when a certificate is within 30 days of expiry.
  #
  # Manual commands:
  #   docker compose --profile production exec certbot certbot certificates
  #   docker compose --profile production exec certbot certbot renew --dry-run
  #   docker compose --profile production exec certbot certbot renew --force-renewal
  #
  # See: Docs/operations/ssl-certificates.md
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: staffora-certbot
    restart: unless-stopped
    profiles:
      - production
    volumes:
      # Certificate storage — shared with nginx (rw for certbot, ro for nginx)
      - certbot_conf:/etc/letsencrypt
      # ACME challenge webroot — shared with nginx
      - certbot_webroot:/var/www/certbot
      # Certbot CLI configuration
      - ./certbot/cli.ini:/etc/letsencrypt/cli.ini:ro
    # Check for renewal every 12 hours (43200 seconds).
    # certbot renew exits immediately if no certificates need renewal.
    # The trap ensures clean shutdown on SIGTERM/SIGINT.
    entrypoint: >
      /bin/sh -c '
        trap exit TERM INT;
        while :; do
          certbot renew --quiet;
          sleep 43200 & wait $${!};
        done
      '
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Monitoring Profile Services
  # ===========================================================================
  # Full observability stack: log aggregation (Loki + Promtail), metrics
  # (Prometheus + exporters), tracing (Tempo), and dashboards (Grafana).
  #
  # Enable with: docker compose --profile monitoring up -d
  #
  # Architecture:
  #   Docker containers --> json-file driver --> /var/lib/docker/containers/
  #   Promtail (tails log files via Docker socket) --> Loki (stores + indexes)
  #   API/Worker --[OTLP HTTP]--> Tempo (stores + indexes traces)
  #   Grafana (queries Loki via LogQL + Prometheus via PromQL + Tempo via TraceQL)
  #
  # Log Rotation:
  #   All containers use json-file driver with rotation:
  #     max-size: 50m (api, worker, postgres, nginx) or 20m (redis, web, others)
  #     max-file: 5 (high-volume) or 3 (low-volume)
  #   Promtail reads these rotated files seamlessly via the Docker socket.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Grafana Tempo -- Distributed tracing backend
  # ---------------------------------------------------------------------------
  # Receives traces via OTLP (gRPC :4317, HTTP :4318) from the API and Worker
  # services. Stores traces locally with 72-hour retention. Queryable through
  # Grafana's Explore view or the Tempo HTTP API on port 3200.
  #
  # API/Worker send traces when OTEL_ENABLED=true.
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.6.1
    container_name: staffora-tempo
    restart: unless-stopped
    profiles:
      - monitoring
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
    ports:
      - "${TEMPO_OTLP_GRPC_PORT:-4317}:4317"     # OTLP gRPC receiver
      - "${TEMPO_OTLP_HTTP_PORT:-4318}:4318"      # OTLP HTTP receiver
      - "${TEMPO_HTTP_PORT:-3200}:3200"            # Tempo query API
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Loki -- Log aggregation and storage
  # ---------------------------------------------------------------------------
  # Receives logs from Promtail, indexes labels (not full text), and serves
  # LogQL queries to Grafana. Uses local filesystem storage with 30-day
  # retention. Lighter than ELK for structured log aggregation.
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.4.2
    container_name: staffora-loki
    restart: unless-stopped
    profiles:
      - monitoring
    command:
      - "-config.file=/etc/loki/local-config.yaml"
      - "-config.expand-env=true"
    ports:
      - "${LOKI_PORT:-3101}:3100"
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    environment:
      # Retention period override (default: 720h = 30 days)
      LOKI_RETENTION_PERIOD: ${LOKI_RETENTION_PERIOD:-720h}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Promtail -- Log collection agent
  # ---------------------------------------------------------------------------
  # Discovers Docker containers via the Docker socket, tails their log files,
  # parses structured JSON logs (Pino from API/worker), extracts labels
  # (level, service, container), and pushes log entries to Loki.
  #
  # Requires Docker socket mount for container discovery.
  # Also mounts /var/lib/docker/containers for reading log files.
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.4.2
    container_name: staffora-promtail
    restart: unless-stopped
    profiles:
      - monitoring
    command:
      - "-config.file=/etc/promtail/config.yml"
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      # Docker socket for container discovery
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Docker container log files (json-file driver output)
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Prometheus -- Metrics collection and alerting
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: staffora-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Grafana -- Dashboards and visualization
  # ---------------------------------------------------------------------------
  # Pre-provisioned with Prometheus, Loki, and Tempo datasources, plus
  # dashboards for platform overview (metrics), log exploration (Loki),
  # and distributed trace exploration (Tempo).
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.1
    container_name: staffora-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-staffora}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3100}
      GF_SERVER_HTTP_PORT: "3100"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/staffora-overview.json
      # Enable Explore for ad-hoc log and trace queries
      GF_EXPLORE_ENABLED: "true"
    ports:
      - "${GRAFANA_PORT:-3100}:3100"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # PostgreSQL Exporter -- Exposes pg_stat metrics to Prometheus
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: staffora-postgres-exporter
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-hris}:${POSTGRES_PASSWORD:-hris_dev_password}@postgres:5432/${POSTGRES_DB:-hris}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  # ---------------------------------------------------------------------------
  # Redis Exporter -- Exposes Redis metrics to Prometheus
  # ---------------------------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: staffora-redis-exporter
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-staffora_redis_dev}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - staffora-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  postgres_wal_archive:
    driver: local
  redis_data:
    driver: local
  worker_uploads:
    driver: local
  backup_data:
    driver: local
  clamav_data:
    driver: local
  # Nginx proxy cache volume
  nginx_cache:
    driver: local
  # Let's Encrypt certificate storage (managed by certbot)
  certbot_conf:
    driver: local
  certbot_webroot:
    driver: local
  # Uptime monitoring volume
  uptime_kuma_data:
    driver: local
  # Monitoring profile volumes
  loki_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  tempo_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  staffora-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

