# =============================================================================
# Grafana Datasource Provisioning — Prometheus
# =============================================================================
# Auto-configures Prometheus as the default datasource on first boot.
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "10s"
      httpMethod: POST
