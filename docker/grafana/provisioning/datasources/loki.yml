# =============================================================================
# Grafana Datasource Provisioning -- Loki
# =============================================================================
# Auto-configures Loki as a datasource on first boot.
# Used by docker-compose.logging.yml for log aggregation.
#
# Note: This file is only mounted when running with the logging stack.
# Prometheus remains the default datasource for metrics.
# =============================================================================

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      timeout: 60
      derivedFields:
        # Link traceId fields in structured logs to Tempo trace view
        - datasourceUid: tempo
          matcherRegex: '"traceId":"([a-f0-9]+)"'
          name: TraceID
          url: "$${__value.raw}"
          urlDisplayLabel: "View Trace"
        # Link request IDs for non-traced requests
        - datasourceUid: ""
          matcherRegex: '"requestId":"([a-f0-9_]+)"'
          name: RequestID
          url: ""
