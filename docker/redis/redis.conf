# Staffora Platform Redis Configuration
# Development configuration - NOT for production use

# =============================================================================
# NETWORK
# =============================================================================

# Bind to all interfaces (container networking)
bind 0.0.0.0

# Default port
port 6379

# TCP keepalive
tcp-keepalive 300

# =============================================================================
# GENERAL
# =============================================================================

# Run as daemon (disabled for Docker)
daemonize no

# Log level: debug, verbose, notice, warning
loglevel notice

# Log to stdout for Docker
logfile ""

# Number of databases (0-15)
databases 16

# =============================================================================
# SNAPSHOTTING (RDB Persistence)
# =============================================================================

# Save to disk:
# after 900 sec (15 min) if at least 1 key changed
# after 300 sec (5 min) if at least 10 keys changed
# after 60 sec if at least 10000 keys changed
save 900 1
save 300 10
save 60 10000

# Stop accepting writes on RDB save error
stop-writes-on-bgsave-error yes

# Compress RDB files
rdbcompression yes

# RDB checksum
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Working directory
dir /data

# =============================================================================
# APPEND ONLY MODE (AOF Persistence)
# =============================================================================

# Enable AOF persistence
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# Fsync policy: always, everysec, no
appendfsync everysec

# Don't fsync during rewrite
no-appendfsync-on-rewrite no

# Auto rewrite AOF
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# =============================================================================
# MEMORY MANAGEMENT
# =============================================================================

# Max memory (adjust based on container limits)
maxmemory 256mb

# Eviction policy when max memory reached
# volatile-lru: Remove least recently used keys with expire set
# allkeys-lru: Remove least recently used keys
# volatile-ttl: Remove keys with shortest TTL
# noeviction: Return error on write operations
maxmemory-policy volatile-lru

# LRU samples to check
maxmemory-samples 5

# =============================================================================
# LAZY FREEING
# =============================================================================

# Lazy free on eviction
lazyfree-lazy-eviction yes

# Lazy free on expire
lazyfree-lazy-expire yes

# Lazy free on server delete
lazyfree-lazy-server-del yes

# =============================================================================
# CLIENTS
# =============================================================================

# Max connected clients
maxclients 1000

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# =============================================================================
# SLOW LOG
# =============================================================================

# Log queries slower than this (microseconds)
slowlog-log-slower-than 10000

# Max slow log entries
slowlog-max-len 128

# =============================================================================
# STREAMS (Used for job queues)
# =============================================================================

# Stream node max bytes
stream-node-max-bytes 4096

# Stream node max entries
stream-node-max-entries 100

# =============================================================================
# ADVANCED CONFIG
# =============================================================================

# Hash encoding thresholds
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List encoding thresholds
list-max-ziplist-size -2

# Set encoding thresholds
set-max-intset-entries 512

# Sorted set encoding thresholds
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog sparse representation threshold
hll-sparse-max-bytes 3000

# Active rehashing
activerehashing yes

# Resize hash tables incrementally
hz 10

# =============================================================================
# SECURITY (Development only - add password for production)
# =============================================================================

# No password in development
# requirepass your-secure-password-here

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""
# rename-command CONFIG ""
